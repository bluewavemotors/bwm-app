<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BWM Inventory</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
</head>
<body>

<div class="header">
  
  <div class="header-top">
    <img src="logo.png" class="logo">
    <h2>BWM Inventory</h2>
  </div>

  <!-- 🔍 Search with Clear Button -->
  <div style="position:relative;">
    <input 
      type="text" 
      id="search" 
      placeholder="Search brand, model, fuel, color..." 
      style="padding-right:35px;"
    >

    <!-- 🔍 QUICK FILTER BUTTONS: 🚗 Diesel  |  ⛽ Petrol  |  💰 Under 20L  |  ⭐ In Showroom -->
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;">
      <button onclick="quickFilter('diesel')">Diesel</button>
      <button onclick="quickFilter('petrol')">Petrol</button>
      <button onclick="quickFilter('under20')">Under 20L</button>
      <button onclick="quickFilter('showroom')">In Showroom</button>
      <button onclick="quickFilter('clear')">Clear</button>
    </div>
    
    <span id="clearBtn" 
      onclick="clearSearch()" 
      style="
        position:absolute;
        right:10px;
        top:50%;
        transform:translateY(-50%);
        cursor:pointer;
        font-size:18px;
        color:#888;
        display:none;
      "
    >
      ✖
    </span>
  </div>

  <!-- ✅ Checkbox aligned -->
  <label class="filter-row">
    <input type="checkbox" id="showroomOnly">
    <span>Show In Showroom Only</span>
  </label>

  <!-- 💰 Budget Filter -->
  <select id="budgetFilter" class="dropdown">
    <option value="">All Budgets</option>
    <option value="1000000">Under 10 Lakhs</option>
    <option value="2000000">Under 20 Lakhs</option>
    <option value="3000000">Under 30 Lakhs</option>
    <option value="5000000">Under 50 Lakhs</option>
  </select>

  <!-- 🔄 Refresh -->
  <button onclick="loadCars()" style="
    margin-top:8px;
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#444;
    color:white;
  ">
    🔄 Refresh
  </button>

</div>

<!-- ⏳ Loading -->
<div id="loading" class="loading"></div>

<!-- 🕒 Last Updated -->
<div id="lastUpdated"></div>

<!-- 🚗 Cars List -->
<div id="carList"></div>

<script src="app.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log("Service Worker Registered"));
  }
</script>

</body>
</html>
