<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BWM Inventory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="header-top">
    <img src="logo.png" class="logo">
    <h2>BWM Inventory</h2>
  </div>

  <input type="text" id="search" placeholder="Search brand, model, fuel, color...">

  <label class="filter-label">
    <input type="checkbox" id="showroomOnly">
    Show In Showroom Only
  </label>

  <select id="budgetFilter" class="dropdown">
    <option value="">All Budgets</option>
    <option value="1000000">Under 10 Lakhs</option>
    <option value="2000000">Under 20 Lakhs</option>
    <option value="3000000">Under 30 Lakhs</option>
    <option value="5000000">Under 50 Lakhs</option>
  </select>

  <!-- 🔄 Refresh Button -->
  <button onclick="loadCars()" style="
    margin-top:8px;
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#444;
    color:white;
  ">
    🔄 Refresh
  </button>
</div>

<!-- ⏳ Loading / Status -->
<div id="loading" style="text-align:center; padding:20px;">
  Loading cars...
</div>

<!-- 🕒 Last Updated -->
<div id="lastUpdated" style="text-align:center; font-size:12px; color:#666;"></div>

<div id="carList"></div>

<script src="app.js"></script>

</body>
</html>
