<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Wave Motors car details</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f2f2f2;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 12px;
      border-radius: 10px;
    }

    .slider {
      display: flex;
      overflow-x: auto;
      gap: 10px;
    }

    .slide {
      flex: 0 0 90%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
    }

    .price {
      font-weight: bold;
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="content"></div>

<script>

const API = "YOUR_APPS_SCRIPT_WEBAPP_URL"; // 🔥 replace

async function loadShare() {

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) {
    document.body.innerHTML = "❌ Invalid link";
    return;
  }

  try {
    const res = await fetch(API + "?id=" + id);
    const data = await res.json();

    // 🔒 Expiry check
    if (new Date() > new Date(data.expiry)) {
      document.body.innerHTML = "❌ This link has expired";
      return;
    }

    // ✅ FIX: handle both array & string
    const images = Array.isArray(data.images)
      ? data.images
      : (data.images ? data.images.split(",") : []);

    document.getElementById("content").innerHTML = `
      <div class="card">

        <div class="slider">
          ${images.map(img => `<img src="${img}" class="slide">`).join("")}
        </div>

        <h3>${data.brand} ${data.model}</h3>
        <p>${data.variant || ""}</p>
        <p>${data.year} | ${data.fuel} | ${data.km} km</p>

        <div class="price">${data.price}</div>

      </div>
    `;

  } catch (err) {
    document.body.innerHTML = "❌ Error loading data";
  }
}

loadShare();

</script>

</body>
</html>
